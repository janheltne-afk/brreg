name: Daglig roller-oppdatering

# Henter rolle-endringer (ny styreleder, daglig leder osv.) fra Enhetsregisteret
# og oppdaterer brreg.roller. Kjører hver natt + kan startes manuelt.
on:
  schedule:
    - cron: "0 5 * * *" # 05:00 UTC hver dag
  workflow_dispatch:

jobs:
  oppdater-roller:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Oppdater roller (delta)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF || 'ojvqmajyaexisglsykww' }}
        run: python3 tools/load-roller-delta.py
